name: ShortForge Autopilot
on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes — matches custom HH:MM slot times within ±5 min
  workflow_dispatch:
    inputs:
      force_test:
        description: "Upload latest ready Test Flow video now"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "24" }
      - name: Show config
        run: |
          echo "APP_BASE_URL is set: ${{ secrets.APP_BASE_URL != '' }}"
          echo "AUTOPILOT_SECRET fallback is set: ${{ secrets.AUTOPILOT_SECRET != '' }}"
          echo "GitHub OIDC auth is enabled for this workflow"
          echo "Manual force test: ${{ github.event_name == 'workflow_dispatch' && inputs.force_test == 'true' }}"
      - name: Run autopilot
        env:
          AUTOPILOT_SECRET: ${{ secrets.AUTOPILOT_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AUTOPILOT_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_test == 'true' && '1' || '0' }}
        run: node scripts/autopilot-runner.mjs

